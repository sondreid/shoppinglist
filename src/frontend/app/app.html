<!doctype html>
<html lang="en">

</html>

<head>
  <meta charset="utf-8">
  <meta name="description" content="Shopping List">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/vendor.min.css">
  <link rel="stylesheet" href="css/app.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src="js/vendor.min.js"></script>
  <script type="text/javascript" src="js/app.js"></script>
  <script type="text/javascript" src="js/auth.js"></script>
  <script type="text/javascript" src="js/offline.js"></script>
  <script src="https://unpkg.com/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
  <!-- GLightbox for image viewing -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
</head>


<body>
  <div class="container">


    <div class="header-row">
      <div id="auth-container"></div>
    </div>

    <div id="offline-banner" class="offline-banner">You are offline</div>

    <h1 style="text-align: center;">Shoppinglist</h1>
    

    <div class="list-container">

      <div class="input-row">
        <input type="text" class="form-control" id="newItemInput" placeholder="New item"
          onkeypress="if(event.key === 'Enter') addItem();">
        <div class="input-actions">
          <label class="file-upload-btn btn btn-default" for="imageInput">
            <span>📷</span>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
          </label>
          <button type="button" class="btn btn-primary" onclick="addItem()">Add</button>
        </div>
      </div>

      <div id="checkbox-container">
      </div>

      <div id="checked-items-container">
        <h5>Completed Items</h5>
      </div>

      <button type="button" id="loadMoreCompleted" class="btn btn-default btn-sm"
              style="display:none; margin-top:0.5rem;" onclick="loadMoreCompleted()">
        Load more
      </button>

    </div>





    </div>


    <script>

      // Initialize GLightbox
      let lightbox;
      document.addEventListener('DOMContentLoaded', () => {
        lightbox = GLightbox({ selector: '.glightbox' });
      });

      function refreshLightbox() {
        if (lightbox) lightbox.destroy();
        lightbox = GLightbox({ selector: '.glightbox' });
      }

      function getImageDataUrl(item) {
        if (!item.isImage || !item.image) return null;
        return `data:${item.image.contentType};base64,${item.image.imageBinary}`;
      }

      // Quantity lives in its own column; the input box still accepts an
      // " xN" suffix as a shortcut ("milk x3" adds quantity 3).
      function parseQtyInput(text) {
        const m = /^(.*\S)\s+x(\d+)$/i.exec(text || '');
        if (m) return { name: m[1], qty: Math.max(1, parseInt(m[2], 10)) };
        return { name: (text || '').trim(), qty: 1 };
      }

      function findUncompletedByName(name) {
        const labels = document.querySelectorAll('#checkbox-container label.form-check-label');
        for (const label of labels) {
          if (label.textContent.trim().toLowerCase() === name.toLowerCase()) {
            const row = label.closest('.form-check');
            return {
              id: parseInt(label.htmlFor.replace('item', ''), 10),
              name: label.textContent.trim(),
              qty: parseInt(row?.dataset.qty || '1', 10)
            };
          }
        }
        return null;
      }

      function applyQtyToRow(itemId, qty) {
        const row = document.getElementById(`item${itemId}`)?.parentNode;
        if (row) row.dataset.qty = qty;
        const value = document.getElementById(`qty${itemId}`);
        if (value) value.textContent = qty;
      }

      function setQty(itemId, name, qty) {
        return fetch(`${auth.getApiBase()}/shoppingitem/${itemId}`, {
          method: 'PUT',
          headers: auth.getAuthHeaders(),
          body: JSON.stringify({ id: itemId, name: name, isComplete: false, quantity: qty })
        })
          .then(handleJson)
          .then(() => applyQtyToRow(itemId, qty))
          .catch((error) => {
            console.error('Error:', error);
          });
      }

      function changeQty(itemId, delta) {
        const label = document.querySelector(`label[for="item${itemId}"]`);
        const row = document.getElementById(`item${itemId}`)?.parentNode;
        if (!label || !row) return;
        const qty = parseInt(row.dataset.qty || '1', 10);
        const newQty = qty + delta;
        if (newQty < 1 || newQty === qty) return;
        setQty(itemId, label.textContent, newQty);
      }

      let itemCount = 1;
      let completedOffset = 0;
      const COMPLETED_PAGE_SIZE = 100;

      function handleJson(response) {
        if (response.status === 401) {
          auth.handleUnauthorized();
          return Promise.reject(new Error('Unauthorized'));
        }
        return response.json();
      }

      async function compressImage(file, maxDim = 1024, quality = 0.7) {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload = () => resolve(i);
          i.onerror = reject;
          i.src = dataUrl;
        });
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const outDataUrl = canvas.toDataURL('image/jpeg', quality);
        return {
          contentType: 'image/jpeg',
          base64: outDataUrl.split(',')[1],
          fileName: file.name.replace(/\.[^.]+$/, '') + '.jpg'
        };
      }

      async function addItem() {
        const newItemInput = document.getElementById('newItemInput');
        const fileInput = document.getElementById('imageInput');
        const itemText = newItemInput.value.trim();
        const file = fileInput.files[0];

        // Need at least text or image
        if (!itemText && !file) return;

        if (file) {
          const compressed = await compressImage(file);
          sendItem({
            Name: itemText || null,
            IsComplete: false,
            IsImage: true,
            Image: {
              FileName: compressed.fileName,
              ContentType: compressed.contentType,
              ImageBinary: compressed.base64
            }
          });
        } else {
          // Adding a name that is already on the list bumps its quantity
          // instead of creating a duplicate row.
          const incoming = parseQtyInput(itemText);
          const existing = findUncompletedByName(incoming.name);
          if (existing) {
            setQty(existing.id, existing.name, existing.qty + incoming.qty);
            newItemInput.value = '';
            return;
          }
          sendItem({
            Name: incoming.name,
            IsComplete: false,
            IsImage: false,
            Image: null,
            Quantity: incoming.qty
          });
        }
      }

      function sendItem(item) {
        fetch(`${auth.getApiBase()}/shoppingitem`, {
          method: 'POST',
          headers: auth.getAuthHeaders(),
          body: JSON.stringify(item)
        })
          .then(handleJson)
          .then(data => {
            console.log('Success:', data);
            document.getElementById('newItemInput').value = '';
            document.getElementById('imageInput').value = '';
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      }

      function updateLoadMoreButton(hasMore) {
        const btn = document.getElementById('loadMoreCompleted');
        if (btn) btn.style.display = hasMore ? '' : 'none';
      }

      function loadMoreCompleted() {
        fetch(`${auth.getApiBase()}/completedshoppingitems?skip=${completedOffset}&take=${COMPLETED_PAGE_SIZE}`, {
          method: 'GET',
          headers: auth.getAuthHeaders()
        })
          .then(handleJson)
          .then(page => {
            page.items.forEach(item => addItemToCheckMarked(item, true));
            completedOffset += page.items.length;
            updateLoadMoreButton(page.hasMore);
            refreshLightbox();
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      }

      function loadItems() {
        return Promise.all([
          fetch(`${auth.getApiBase()}/uncompletedshoppingitems`, {
            method: 'GET',
            headers: auth.getAuthHeaders()
          }).then(handleJson),
          fetch(`${auth.getApiBase()}/completedshoppingitems?skip=0&take=${COMPLETED_PAGE_SIZE}`, {
            method: 'GET',
            headers: auth.getAuthHeaders()
          }).then(handleJson)
        ])
          .then(([uncompleted, completedPage]) => {
            uncompleted.forEach(item => shoppingList.addItemToForm(item));
            completedPage.items.forEach(item => addItemToCheckMarked(item, true));
            completedOffset = completedPage.items.length;
            updateLoadMoreButton(completedPage.hasMore);
            refreshLightbox();
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      }

      function fullResync() {
        const checkbox = document.getElementById('checkbox-container');
        if (checkbox) checkbox.replaceChildren();
        const completed = document.getElementById('checked-items-container');
        if (completed) {
          completed.querySelectorAll('.checked-item').forEach(n => n.remove());
        }
        completedOffset = 0;
        updateLoadMoreButton(false);
        return loadItems();
      }

      let lastResyncMs = 0;
      function maybeResync(reason) {
        const now = Date.now();
        if (now - lastResyncMs < 1000) return;
        lastResyncMs = now;
        console.log('Resync triggered:', reason);
        const conn = window._hub;
        if (conn && conn.state === signalR.HubConnectionState.Disconnected) {
          // Reconnect before resyncing, so changes made while the resync
          // fetch is in flight arrive as events instead of being missed.
          conn.start()
            .then(() => fullResync())
            .catch(err => {
              console.error('Manual reconnect failed:', err);
              fullResync();
            });
        } else {
          fullResync();
        }
      }

      let hubRestartTimer = null;
      function scheduleHubRestart() {
        if (hubRestartTimer) return;
        hubRestartTimer = setTimeout(() => {
          hubRestartTimer = null;
          const conn = window._hub;
          if (!conn || conn.state !== signalR.HubConnectionState.Disconnected) return;
          conn.start()
            .then(() => fullResync())
            .catch(() => scheduleHubRestart());
        }, 5000);
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') maybeResync('visibilitychange');
      });

      window.addEventListener('pageshow', (e) => {
        if (e.persisted) maybeResync('bfcache-restore');
      });

      function deleteItem(id) {
        if (!confirm('Delete this item permanently?')) return;
        fetch(`${auth.getApiBase()}/shoppingitem/${id}`, {
          method: 'DELETE',
          headers: auth.getAuthHeaders()
        })
          .then(response => {
            if (response.status === 401) { auth.handleUnauthorized(); return; }
            document.getElementById(`completed-item${id}`)?.remove();
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      }
      document.addEventListener('DOMContentLoaded', function () {
        offline.init();
        auth.init().then(() => {
          if (!auth.isAuthenticated) {
            window.location.href = 'index.html';
            return;
          }
          // Connect the hub before the initial load, so items created while
          // the load is in flight arrive as events instead of being missed.
          // Duplicate renders are prevented by the per-id guards.
          initializeSignalR().then(() => loadItems());
        });
      });




      function updateItem(itemId) {


        let isComplete = document.getElementById(`item${itemId}`).checked;
        let rowQty = parseInt(document.getElementById(`item${itemId}`)?.parentNode?.dataset.qty || '1', 10);
        let newItem = JSON.stringify({
          id: itemId,
          name: document.querySelector(`label[for="item${itemId}"]`)?.textContent || null,
          isComplete: isComplete,
          quantity: rowQty
        });

        fetch(`${auth.getApiBase()}/shoppingitem/${itemId}`, {
          method: 'PUT',
          headers: auth.getAuthHeaders(),
          body: newItem
        })
          .then(response => {
            if (response.status === 401) { auth.handleUnauthorized(); return Promise.reject(new Error('Unauthorized')); }
            return response.json();
          })
          .then(data => {

            if (isComplete) {
              const checkboxDiv = document.getElementById(`item${itemId}`)?.parentNode;
              const itemName = document.querySelector(`label[for="item${itemId}"]`)?.textContent || null;
              const imgEl = checkboxDiv?.querySelector('img');
              const itemData = { id: itemId, name: itemName, quantity: rowQty };
              if (imgEl) {
                const src = imgEl.src;
                const contentType = src.split(';')[0].split(':')[1];
                const base64 = src.split(',')[1];
                itemData.isImage = true;
                itemData.image = { contentType, imageBinary: base64 };
              }
              if (checkboxDiv) checkboxDiv.remove();
              addItemToCheckMarked(itemData);
            }
          })
          .catch((error) => {
            console.error('Error:', error);
          });


      };

      function addItemToCheckMarked(item, atEnd = false) {
        let checkedContainer = document.getElementById('checked-items-container');

        if (document.getElementById(`completed-item${item.id}`)) {
          return;
        }

        const itemDiv = document.createElement('div');
        itemDiv.className = 'checked-item d-flex align-items-center gap-2 mb-2';
        itemDiv.id = `completed-item${item.id}`;
        itemDiv.dataset.qty = item.quantity || 1;

        let content = `
          <input type="checkbox" class="form-check-input completed-checkbox" checked
            id="completed-cb${item.id}" onchange="uncompleteItem(${item.id}, this)">
        `;

        if (item.isImage && item.image) {
          const dataUrl = getImageDataUrl(item);
          content += `
            <a href="${dataUrl}" class="glightbox" data-gallery="completed">
              <img src="${dataUrl}" alt="${item.name || 'Image'}" style="max-width: 40px; max-height: 40px; cursor: pointer; opacity: 0.6;">
            </a>
          `;
        }

        if (item.name) {
          content += `<span class="completed-name" style="text-decoration: line-through;">${item.name}</span>`;
        }
        if ((item.quantity || 1) > 1) {
          content += `<span class="completed-qty">×${item.quantity}</span>`;
        }

        content += `<button type="button" class="delete-completed" aria-label="Delete" onclick="deleteItem(${item.id})">🗑</button>`;

        itemDiv.innerHTML = content;
        // Live completions go to the top (last-completed first). Loading uses
        // atEnd: the API returns pages newest-first, so appending keeps that
        // order and "Load more" pages land below the ones already shown.
        const heading = checkedContainer.querySelector('h5');
        if (!atEnd && heading && heading.nextSibling) {
          checkedContainer.insertBefore(itemDiv, heading.nextSibling);
        } else {
          checkedContainer.appendChild(itemDiv);
        }
        refreshLightbox();
      }

      function uncompleteItem(itemId, checkbox) {
        const completedDiv = document.getElementById(`completed-item${itemId}`);
        const itemName = completedDiv?.querySelector('span.completed-name')?.textContent || null;
        const itemQty = parseInt(completedDiv?.dataset.qty || '1', 10);

        fetch(`${auth.getApiBase()}/shoppingitem/${itemId}`, {
          method: 'PUT',
          headers: auth.getAuthHeaders(),
          body: JSON.stringify({ id: itemId, name: itemName, isComplete: false, quantity: itemQty })
        })
          .then(response => {
            if (response.status === 401) { auth.handleUnauthorized(); return Promise.reject(new Error('Unauthorized')); }
            return response.json();
          })
          .then(data => {
            console.log('Uncompleted:', data);
            if (completedDiv) completedDiv.remove();
            shoppingList.addItemToForm({ id: itemId, name: itemName, quantity: itemQty });
          })
          .catch(error => {
            console.error('Error:', error);
            if (checkbox) checkbox.checked = true;
          });
      }

      function initializeSignalR() {
        const hubUrl = window.location.port === '4000' ? 'http://localhost:5058/itemhub' : '/itemhub';
        const connectionOptions = {};
        
        if (auth.isAuthenticated && auth.token) {
          connectionOptions.accessTokenFactory = () => auth.token;
        }
        
        const connection = new signalR.HubConnectionBuilder()
          .withUrl(hubUrl, connectionOptions)
          .withAutomaticReconnect()
          .build();
        window._hub = connection;

        // Handlers must be registered before start(); events that arrive
        // between connecting and subscribing are dropped, not queued.
        connection.on("ItemCreated", (item) => {
          console.log("Item created via SignalR:", item);
          shoppingList.addItemToForm(item);
        });
        connection.on("ItemUpdated", (item) => {
          console.log("Item updated via SignalR:", item);

          if (item.isComplete) {
            const checkboxDiv = document.getElementById(`item${item.id}`)?.parentNode;
            // The ItemUpdated broadcast carries no image binary, so salvage
            // the thumbnail from the row being replaced.
            if (item.isImage && !item.image) {
              const src = checkboxDiv?.querySelector('img')?.src;
              if (src) {
                item.image = {
                  contentType: src.split(';')[0].split(':')[1],
                  imageBinary: src.split(',')[1]
                };
              }
            }
            if (checkboxDiv) {
              checkboxDiv.remove();
            }
            addItemToCheckMarked(item);
          } else {
            const completedDiv = document.getElementById(`completed-item${item.id}`);
            if (item.isImage && !item.image) {
              const src = completedDiv?.querySelector('img')?.src;
              if (src) {
                item.image = {
                  contentType: src.split(';')[0].split(':')[1],
                  imageBinary: src.split(',')[1]
                };
              }
            }
            if (completedDiv) {
              completedDiv.remove();
            }
            if (!document.getElementById(`item${item.id}`)) {
              shoppingList.addItemToForm(item);
            } else {
              // Apply renames and quantity changes to the existing row.
              const label = document.querySelector(`label[for="item${item.id}"]`);
              if (label && item.name && label.textContent !== item.name) {
                label.textContent = item.name;
              }
              applyQtyToRow(item.id, item.quantity || 1);
            }
          }
        });
        connection.on("ItemDeleted", (id) => {
          console.log("Item deleted via SignalR:", id);
          document.getElementById(`completed-item${id}`)?.remove();
          document.getElementById(`item${id}`)?.parentNode?.remove();
        });
        connection.onreconnected(() => {
          console.log('SignalR reconnected — full resync');
          fullResync();
        });
        connection.onclose(() => {
          // Fires when automatic reconnect has given up.
          scheduleHubRestart();
        });

        return connection.start().catch(err => {
          console.error("SignalR connection error:", err);
          scheduleHubRestart();
        });
      }




    </script>






</body>

</html>
